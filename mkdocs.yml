site_name: CUDA Dojo
site_description: A level-by-level, Feynman-style interactive guide to CUDA.
site_url: https://bolu.dev/cuda-dojo/
repo_url: https://github.com/bolu-atx/cuda-dojo
repo_name: bolu-atx/cuda-dojo
docs_dir: docs
site_dir: out/docs

theme:
  name: material
  logo: assets/mkdocs-logo.webp
  favicon: assets/mkdocs-logo.webp
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: light green
      accent: light green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: light green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
    - toc.integrate   # fold the page TOC into the left nav → wider reading column

extra_css:
  - assets/dojo.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - pymdownx.details
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - assets/dojo.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Levels:
      - "Level 0 — GPU Mental Model": level00-mental-model.md
      - "Level 1 — CUDA Basics": level01-basics.md
      - "Level 2 — Thread Mapping": level02-thread-mapping.md
      - "Level 3 — Memory Hierarchy": level03-memory-hierarchy.md
      - "Level 4 — Performance Thinking": level04-performance.md
      - "Level 5 — Shared-Memory Algorithms": level05-shared-memory.md
      - "Level 6 — Warp Programming": level06-warps.md
      - "Level 7 — CUDA Libraries": level07-libraries.md
      - "Level 8 — Streams & Asynchrony": level08-streams.md
      - "Level 9 — Multi-Kernel Algorithms": level09-multi-kernel.md
      - "Level 10 — Production Optimization": level10-optimization.md
      - "Level 11 — Orchestration Patterns": level11-orchestration.md
      - "Level 12 — Production Architecture": level12-architecture.md
      - "Level 13 — Algorithm Design": level13-algorithm-design.md
      - "Level 14 — Intra-Kernel Pipeline": level14-tile-pipeline.md
  - Advanced Tracks:
      - "Architecture Deep Dive": track-architecture.md
      - "Library Field Guide": track-libraries.md
      - "Imaging & Computer Vision": track-imaging.md
